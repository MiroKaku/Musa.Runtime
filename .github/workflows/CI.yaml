# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    # The branches below must be a subset of the branches above
    branches:
      - main
    paths:
      - 'Musa.Runtime/**'
      - 'Microsoft.VisualC.Runtime/**'
      - 'BuildAllTargets.*'
      - '*.props'
      - '*.targets'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: windows-2025-vs2026

    # Any commit that contains [build] will now trigger these jobs, everything else will be skipped.
    # if: "contains(github.event.head_commit.message, '[build]')"

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $BuildVersion = "${{ github.ref_name }}".Substring(1);
          echo "BuildVersion=$BuildVersion" >> $env:GITHUB_ENV
          echo $BuildVersion

      - name: Setup Windows Driver Kit
        shell: pwsh
        run: |
          $IncludeDir = "C:\Program Files (x86)\Windows Kits\10\Include"

          # --- Detect installed SDK ---
          Write-Host "=== SDK Detection ===" -ForegroundColor Cyan
          $SdkVersions = Get-ChildItem $IncludeDir -Directory |
            Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
            Sort-Object { [Version]$_.Name } -Descending |
            Select-Object -ExpandProperty Name

          if ($SdkVersions.Count -eq 0) {
            Write-Error "No Windows SDK found under $IncludeDir"
            exit 1
          }

          $SdkVersion = $SdkVersions[0]
          $SdkBuild = ([Version]$SdkVersion).Build
          Write-Host "SDK: $SdkVersion (build $SdkBuild)"

          # --- Detect installed WDKs (any version with km subdirectory) ---
          Write-Host "=== WDK Detection ===" -ForegroundColor Cyan
          $InstalledWdkBuilds = @{}
          Get-ChildItem $IncludeDir -Directory |
            Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' -and (Test-Path (Join-Path $_.FullName "km")) } |
            ForEach-Object {
              $build = ([Version]$_.Name).Build
              $InstalledWdkBuilds[$build] = $_.Name
            }

          $installedList = ($InstalledWdkBuilds.Values | Sort-Object) -join ', '
          Write-Host "Installed WDKs: $installedList"

          # --- Query latest WDK from winget ---
          Write-Host "=== Querying Latest WDK ===" -ForegroundColor Cyan
          $wdkSearch = & winget search --id Microsoft.WindowsWDK --source winget --accept-source-agreements 2>&1 | Out-String
          $wdkBuilds = [regex]::Matches($wdkSearch, 'Microsoft\.WindowsWDK\.10\.0\.(\d+)') |
            ForEach-Object { [int]$_.Groups[1].Value } |
            Sort-Object -Unique -Descending

          $LatestWdkBuild = if ($wdkBuilds.Count -gt 0) { $wdkBuilds[0] } else { $SdkBuild }
          Write-Host "Latest available WDK build: $LatestWdkBuild"

          # --- Install matching-SDK WDK ---
          if ($InstalledWdkBuilds.ContainsKey($SdkBuild)) {
            Write-Host "Matching-SDK WDK (build $SdkBuild) already installed." -ForegroundColor Green
          } else {
            $pkg = "Microsoft.WindowsWDK.10.0.$SdkBuild"
            Write-Host "Installing matching-SDK WDK: $pkg ..." -ForegroundColor Yellow
            $log = "$env:RUNNER_TEMP\wdk-install-matching.log"
            & winget install --source winget --exact --id $pkg --accept-source-agreements --accept-package-agreements --silent --log $log
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Matching-SDK WDK install failed (exit $LASTEXITCODE), log:" -ForegroundColor Red
              if (Test-Path $log) { Get-Content $log }
              exit 1
            }
          }

          # --- Install latest WDK (if different from matching-SDK) ---
          if ($LatestWdkBuild -ne $SdkBuild) {
            if ($InstalledWdkBuilds.ContainsKey($LatestWdkBuild)) {
              Write-Host "Latest WDK (build $LatestWdkBuild) already installed." -ForegroundColor Green
            } else {
              $pkg = "Microsoft.WindowsWDK.10.0.$LatestWdkBuild"
              Write-Host "Installing latest WDK: $pkg ..." -ForegroundColor Yellow
              $log = "$env:RUNNER_TEMP\wdk-install-latest.log"
              & winget install --source winget --exact --id $pkg --accept-source-agreements --accept-package-agreements --silent --log $log
              if ($LASTEXITCODE -ne 0) {
                Write-Host "Latest WDK install failed (exit $LASTEXITCODE), log:" -ForegroundColor Red
                if (Test-Path $log) { Get-Content $log }
                exit 1
              }
            }
          } else {
            Write-Host "Latest WDK equals matching-SDK WDK, no extra install needed." -ForegroundColor Green
          }

          # --- Copy VS2026 build tasks DLL from latest WDK to matching-SDK WDK ---
          if ($LatestWdkBuild -ne $SdkBuild) {
            Write-Host "=== Patching matching-SDK WDK with latest build tasks ===" -ForegroundColor Cyan
            $BuildRoot = "C:\Program Files (x86)\Windows Kits\10\build"

            # Resolve full version strings for both WDKs from Include directory
            $MatchingWdkVersion = $SdkVersion
            $LatestWdkFullVersion = (Get-ChildItem $IncludeDir -Directory |
              Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' -and (Test-Path (Join-Path $_.FullName "km")) -and ([Version]$_.Name).Build -eq $LatestWdkBuild } |
              Select-Object -First 1).Name

            if (-not $LatestWdkFullVersion) {
              Write-Warning "Cannot resolve latest WDK full version for build $LatestWdkBuild, skipping DLL copy."
            } else {
              $dllName = "Microsoft.DriverKit.Build.Tasks.18.0.dll"
              $srcDll = "$BuildRoot\$LatestWdkFullVersion\bin\$dllName"
              $dstDir = "$BuildRoot\$MatchingWdkVersion\bin"

              if (Test-Path $srcDll) {
                if (-not (Test-Path $dstDir)) {
                  New-Item -ItemType Directory -Path $dstDir -Force | Out-Null
                }
                Copy-Item -Path $srcDll -Destination $dstDir -Force
                Write-Host "Copied $dllName from $LatestWdkFullVersion to $MatchingWdkVersion" -ForegroundColor Green
              } else {
                Write-Warning "$srcDll not found, skipping DLL copy."
              }
            }
          }
          # --- Post-install verification ---
          Write-Host "=== Post-install Verification ===" -ForegroundColor Cyan
          $KmInclude = "$IncludeDir\$SdkVersion\km"
          $BuildProps = "C:\Program Files (x86)\Windows Kits\10\build\$SdkVersion\WindowsDriver.KernelMode.props"
          $ok = $true

          if (-not (Test-Path $KmInclude)) {
            Write-Warning "KM include missing: $KmInclude"
            $ok = $false
          }
          if (-not (Test-Path $BuildProps)) {
            Write-Warning "KernelMode props missing: $BuildProps"
            $ok = $false
          }

          # Verify latest WDK is also present
          if ($LatestWdkBuild -ne $SdkBuild) {
            $latestDir = Get-ChildItem $IncludeDir -Directory |
              Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' -and (Test-Path (Join-Path $_.FullName "km")) -and ([Version]$_.Name).Build -eq $LatestWdkBuild }
            if (-not $latestDir) {
              Write-Warning "Latest WDK (build $LatestWdkBuild) not found after install."
              $ok = $false
            }
          }

          if ($ok) {
            Write-Host "WDK installation verified successfully." -ForegroundColor Green
          } else {
            Write-Error "WDK installation incomplete - critical files missing."
            exit 1
          }

      - name: Build
        shell: cmd
        run: |
          .\BuildAllTargets.cmd

      - name: Build NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          # github的内置版本有Bug，此行必须添加，否则无法获得内容
          git fetch --depth=1 origin +refs/tags/*:refs/tags/*

          $releaseNotes = & git tag -l --format='%(contents)' $env:GITHUB_REF.Remove(0, 10)
          $content = [System.IO.File]::ReadAllText("Musa.Runtime.NuGet\Musa.Runtime.nuspec")

          $releaseNotesToken = '$releaseNotes$'
          $releaseNotesIndex = $content.IndexOf($releaseNotesToken)

          if($releaseNotesIndex -ne -1)
          {
            echo $content.Substring(0, $releaseNotesIndex) | out-file "Musa.Runtime.NuGet\Musa.Runtime-New.nuspec" -NoNewline
            echo $releaseNotes | out-file "Musa.Runtime.NuGet\Musa.Runtime-New.nuspec" -Append
            echo $content.Remove(0, $releaseNotesIndex + $releaseNotesToken.Length) | out-file "Musa.Runtime.NuGet\Musa.Runtime-New.nuspec" -NoNewline -Append
          }

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          if "${{ env.BuildVersion }}" NEQ "" (
              NuGet pack .\Musa.Runtime.NuGet\Musa.Runtime-New.nuspec -Properties version=${{env.BuildVersion}};commit=%GITHUB_SHA%
          )
          if %ERRORLEVEL% NEQ 0 exit /B %ERRORLEVEL%

      - name: Verify NuGet package exists
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          if not exist Musa.Runtime.${{env.BuildVersion}}.nupkg (
              echo ERROR: NuGet package Musa.Runtime.${{env.BuildVersion}}.nupkg was not produced by the Package step.
              exit /B 1
          )

      - name: Package a zip
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ${{github.workspace}}
        shell: cmd
        run: 7z a -tzip Musa.Runtime.zip Publish\

      - name: Publish NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          NuGet push Musa.Runtime.${{env.BuildVersion}}.nupkg -ApiKey ${{ secrets.NUGET_TOKEN }} -Source https://api.nuget.org/v3/index.json
          if %ERRORLEVEL% NEQ 0 exit /B %ERRORLEVEL%

      - name: Publish
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            Musa.Runtime.zip
            *.nupkg